<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <title>Contact | Tech Help with ❤️</title>
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <header>
        <h1>Tech Help with ❤️</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="pricing.html">Pricing</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section class="contact-card">
            <h2>Contact</h2>
            <p>Send a message and I’ll get back to you as soon as possible.</p>

            <p><strong>Prefer to call or text?</strong></p>
            <p>(760) 283-6499</p>

            <form action="https://formsubmit.co/natashia@techhelpwithheart.com" method="POST">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="phone">Phone (optional)</label>
                <input type="text" id="phone" name="phone">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">What do you need help with?</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <input type="hidden" name="_subject" value="New website contact form submission">
                <input type="hidden" name="_captcha" value="false">
                <button type="submit" class="button">Send Message</button>
            </form>

            <p><strong>Email:</strong> natashia@techhelpwithheart.com</p>
            <p><strong>Service Area:</strong> North County San Diego</p>
        </section>
    </main>

    <footer>
        <p>© 2026 Tech Help with ❤️</p>
    </footer>
</body>
</html>
